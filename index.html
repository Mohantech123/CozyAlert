  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f3f4f6; color: #111; transition: all 0.3s; }
    body.dark { background: #111827; color: #fff; }
    
    /* Global Pink Theme Variables */
    body.pink-theme {
      --ca-primary: #ec4899;
      --ca-primary-hover: #db2777;
      --ca-primary-bg: #fdf2f8;
      --ca-primary-border: #fbcfe8;
      --ca-primary-ring: rgba(236, 72, 153, 0.39);
      --ca-radius: 0px; 
      --ca-radius-modal: 0px;
      --ca-radius-btn: 0px;
      --ca-radius-input: 0px;
      --ca-font: 'Comic Sans MS', cursive, sans-serif;
    }

    .btn-group { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    button { padding: 0.5rem 1rem; cursor: pointer; border: none; border-radius: 0.25rem; font-weight: bold; background: #e5e7eb; color: #111; }
    button:hover { background: #d1d5db; }
    h2 { margin-top: 2rem; border-bottom: 1px solid #ccc; padding-bottom: 0.5rem; }
  </style>
  
  <!-- Load CozyPopup from NPM CDN -->
  <script src="https://cdn.jsdelivr.net/npm/cozy-popup/dist/index.global.js"></script>

<body>
  <h1>CozyPopup Advanced Playground</h1>
  <div class="btn-group">
    <button onclick="document.body.classList.toggle('dark')">Toggle Page Dark Mode</button>
    <button onclick="document.body.classList.toggle('pink-theme')" style="background: #ec4899; color: white;">Toggle Custom Pink Theme</button>
  </div>

  <h2>1. Basic Alerts & Customizations</h2>
  <div class="btn-group">
    <button onclick="Alert.success('Success!', 'Operation completed.')">Success Alert</button>
    <button onclick="Alert.error('Oops...', 'Something went wrong!')">Error Alert</button>
    <button onclick="Alert.warning('Warning', 'Are you sure?')">Warning Alert</button>
    <button onclick="Alert.info('Info', 'Just so you know...')">Info Alert</button>
    <button onclick="Alert.fire({ title: 'No Icon!', text: 'The text and title take up the full space now.', showIcon: false, type: 'success' })">No Icon Alert</button>
  </div>
  <div class="btn-group">
    <button onclick="testConfirm()">Confirm (Promises)</button>
    <button onclick="testTimer()">Timer Alert (Auto Close)</button>
    <button onclick="testCustomHTML()">Custom HTML Content</button>
    <button onclick="testCustomButtons()">Custom Buttons (Colors)</button>
    <button onclick="testDarkTheme()">Force Dark Theme Alert</button>
    <button onclick="testNoIcon()">No Icon Alert</button>
  </div>

  

  <h2>2. Toast Notifications</h2>
  <div class="btn-group">
    <button onclick="testToast('top-right', 'success')">Top Right (Success)</button>
    <button onclick="testToast('top-left', 'info')">Top Left (Info)</button>
    <button onclick="testToast('bottom-right', 'error')">Bottom Right (Error)</button>
    <button onclick="testToast('bottom-left', 'warning')">Bottom Left (Warning)</button>
    <button onclick="Alert.toast({ title: 'Just Text, No Icon', showIcon: false })">No Icon Toast</button>
  </div>
  <div class="btn-group">
    <button onclick="testToast('top', 'success')">Top Center</button>
    <button onclick="testToast('bottom', 'error')">Bottom Center</button>
    <button onclick="testToast('center', 'info')">Center Screen</button>
    <button onclick="Alert.toast({ title: 'I will stay for 5 seconds!', icon: 'info', timer: 5000 })">Longer Timer (5s)</button>
  </div>

  <h2>3. Forms & Loaders</h2>
  <div class="btn-group">
    <button onclick="testForm()">Dynamic Form (PreConfirm Loader)</button>
    <button onclick="testComplexForm()">Complex Registration Form (Regex)</button>
    <button onclick="testFileUpload()">File Upload Component</button>
    <button onclick="testChained()">Chained Modals (Async/Await)</button>
  </div>

  <h2>4. Modals & Offcanvas Drawers</h2>
  <div class="btn-group">
    <button onclick="testModal()" style="background: #64748b; color: white;">Generic Modal (Wide)</button>
    <button onclick="testStaticModal()" style="background: #475569; color: white;">Static Modal (No Outside Click)</button>
  </div>
  <div class="btn-group">
    <button onclick="testOffcanvas('right')" style="background: #14b8a6; color: white;">Offcanvas (Right)</button>
    <button onclick="testOffcanvas('left')" style="background: #14b8a6; color: white;">Offcanvas (Left)</button>
    <button onclick="testOffcanvas('bottom')" style="background: #14b8a6; color: white;">Offcanvas (Bottom)</button>
    <button onclick="testOffcanvas('top')" style="background: #14b8a6; color: white;">Offcanvas (Top)</button>
    <button onclick="testStaticOffcanvas()" style="background: #0f766e; color: white;">Static Offcanvas (No Outside Click)</button>
 
    <button onclick="testModal()">Scrolling Modal (Terms)</button>
    <button onclick="testStaticModal()">Static Modal (No outside click)</button>
    <button onclick="testOffcanvas('top')">Top Drawer</button>
    <button onclick="testOffcanvas('bottom')">Bottom Drawer</button>
    <button onclick="testOffcanvas('left')">Left Drawer</button>
    <button onclick="testOffcanvas('right')">Right Drawer</button>
    <button onclick="testStaticOffcanvas()" style="background: transparent; border: 1px solid #94a3b8; color: #475569;">Static Drawer</button>
    <button onclick="testOffcanvasSize('xl')">Offcanvas XL</button>
  </div>
  <h2>5. Queues / Wizards</h2>
  <div class="btn-group">
    <button onclick="testQueue()" style="background: #8b5cf6; color: white;">Start Wizard</button>
  </div>

  <h2>6. Kitchen Sink / Reference</h2>
  <div class="btn-group">
    <button onclick="testAllFieldTypes()" style="background: #0ea5e9; color: white;">All Form Fields Reference</button>
  </div>

  <script>
    const Alert = CozyAlert.CozyAlert || CozyAlert.default || CozyAlert;

    // 1. Basics & Customizations
    window.testSuccess = () => Alert.success('Success!', 'Your changes have been saved successfully.');
    window.testError = () => Alert.error('Oops...', 'Something went wrong!');
    window.testWarning = () => Alert.warning('Are you sure?', 'You might not be able to revert this.');
    window.testInfo = () => Alert.info('Did you know?', 'CozyAlert is completely framework agnostic.');
    window.testQuestion = () => Alert.fire({ title: 'The Internet?', text: 'That thing is still around?', icon: 'question' });
    
    window.testConfirm = () => Alert.confirm('Delete file?', 'This action cannot be undone.', 'Yes, delete it').then(r => {
      if(r.isConfirmed) Alert.success('Deleted!', 'Your file has been deleted.');
    });
    
    window.testTimer = () => Alert.fire({
      title: 'Auto-closing alert',
      text: 'I will close in 3 seconds.',
      timer: 3000,
      icon: 'info'
    });

    window.testCustomHTML = () => Alert.fire({
      title: 'Custom HTML',
      html: 'You can use <b>bold text</b>, <a href="#">links</a>, or even <br/><br/> <img src="https://placehold.co/150x50" style="border-radius: 8px;"/>',
      icon: 'info'
    });

    window.testCustomButtons = () => Alert.fire({
      title: 'Custom Buttons',
      text: 'You can change the text and color of the buttons easily.',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'Do it!',
      confirmButtonColor: '#10b981', // emerald-500
      cancelButtonText: 'Nevermind',
      cancelButtonColor: '#ef4444' // red-500
    });

    window.testDarkTheme = () => Alert.fire({ title: 'Dark Mode', text: 'I am forced into dark mode regardless of OS settings.', theme: 'dark', icon: 'info' });
    window.testNoIcon = () => Alert.fire({ title: 'No Icon!', text: 'The text and title take up the full space now.', showIcon: false, type: 'success' });

    // 2. Toasts
    window.testToast = (position, icon) => {
      const titles = { success: 'Saved successfully', error: 'Action failed', warning: 'Check your connection', info: 'New message received' };
      Alert.toast({ title: titles[icon], icon, position });
    };

    // 3. Forms
    window.testForm = () => {
      Alert.fire({
        title: 'Sign In',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Login',
        fields: [
          { id: 'email', type: 'email', label: 'Email Address', required: true },
          { id: 'password', type: 'password', label: 'Password', required: true }
        ],
        preConfirm: () => new Promise(resolve => setTimeout(() => resolve(true), 2000))
      }).then(r => {
        if(r.isConfirmed) {
          Alert.success('Data Returned!', `Raw JSON Form Data received:\n\n${JSON.stringify(r.value, null, 2)}`);
        }
      });
    };

    window.testComplexForm = () => {
      Alert.modal({
        title: 'User Registration',
        text: 'Please fill out all the details below.',
        size: 'md',
        fields: [
          { id: 'username', type: 'text', label: 'Username', required: true, pattern: '^[a-zA-Z0-9_]{3,16}$', validationMessage: '3-16 chars, alphanumeric/underscore only.' },
          { id: 'email', type: 'email', label: 'Email', required: true },
          { id: 'role', type: 'select', label: 'Assign Role', options: [{label: 'Developer', value: 'dev'}, {label: 'Manager', value: 'mgr'}], required: true },
          { id: 'bio', type: 'textarea', label: 'Short Bio', placeholder: 'Tell us about yourself...' },
          { id: 'terms', type: 'checkbox', label: 'I accept the terms and conditions', required: true }
        ],
        showCancelButton: true,
        confirmButtonText: 'Register'
      }).then(r => {
        if(r.isConfirmed) Alert.success('Registered!', `Welcome, ${r.value.username}!`);
      });
    };

    window.testFileUpload = () => {
      Alert.fire({
        title: 'Upload Profile Picture',
        showCancelButton: true,
        confirmButtonText: 'Upload',
        fields: [{ id: 'file', type: 'file', accept: 'image/*' }]
      }).then(r => r.isConfirmed && console.log(r.value));
    };

    window.testChained = async () => {
      const step1 = await Alert.fire({ title: 'Step 1', text: 'Ready to start?', showCancelButton: true });
      if (!step1.isConfirmed) return;
      
      const step2 = await Alert.fire({ title: 'Step 2', input: 'text', fields: [{id: 'color', type: 'select', label: 'Favorite Color', options: [{label:'Red', value:'red'}, {label:'Blue', value:'blue'}]}] });
      if (!step2.isConfirmed) return;

      Alert.success('Finished!', `You picked ${step2.value.color}!`);
    };

    // 4. Modals & Offcanvas
    window.testModal = () => {
      Alert.modal({
        title: 'Terms of Service',
        html: '<div style="height: 300px; overflow-y: auto; padding-right: 1rem; text-align: left;"><p>Here are the terms...</p><p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p><p>Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p><br/><br/><br/><br/>More text down here...</div>',
        showCancelButton: true,
        confirmButtonText: 'I Accept',
        width: '800px'
      });
    };

    window.testStaticModal = () => {
      Alert.modal({
        title: 'Mandatory Update',
        text: 'You must click the "Update Now" button. Clicking outside or pressing escape will not close this modal!',
        allowOutsideClick: false,
        allowEscapeKey: false,
        confirmButtonText: 'Update Now',
        showCloseButton: false
      }).then(() => Alert.toast({ title: 'Updating...', icon: 'info' }));
    };

    window.testOffcanvas = (position) => {
      Alert.offcanvas({
        title: `Offcanvas ${position}`,
        text: 'This is a full-height sliding drawer!',
        position,
        fields: [
          { id: 'username', type: 'text', label: 'Username' },
          { id: 'role', type: 'select', label: 'Role', options: [{label: 'Admin', value: 'admin'}, {label: 'User', value: 'user'}] }
        ],
        showCancelButton: true
      });
    };

    window.testStaticOffcanvas = () => {
      Alert.offcanvas({
        title: 'Static Sidebar Form',
        text: "Try clicking outside the sidebar. It won't close!",
        position: 'right',
        allowOutsideClick: false,
        fields: [{ id: 'email', type: 'email', label: 'Email', required: true }],
        showCancelButton: true
      });
    };

    window.testSize = (size) => {
      Alert.modal({
        title: `Size: ${size.toUpperCase()}`,
        text: `This modal is using the '${size}' size preset.`,
        size: size
      });
    };

    window.testOffcanvasSize = (size) => {
      Alert.offcanvas({
        title: `Offcanvas Size: ${size.toUpperCase()}`,
        text: `This offcanvas drawer is using the '${size}' size preset.`,
        position: 'right',
        size: size
      });
    };

    // 5. Queues
    window.testQueue = () => {
      Alert.queue([
        { title: 'Step 1', text: 'Welcome to the setup wizard.', icon: 'info' },
        { title: 'Step 2', fields: [{ id: 'name', type: 'text', label: 'Your Name', required: true }] },
        { title: 'Step 3', text: 'All done!', icon: 'success' }
      ]).then(res => {
        if (res.isCompleted) {
          Alert.success('Wizard Complete', `Name entered: ${res.values[1].name}`);
        }
      });
    };

    // 6. Kitchen Sink (All Types)
    window.testAllFieldTypes = () => {
      Alert.modal({
        title: 'Kitchen Sink',
        text: 'A reference variant showing every supported form field type.',
        fields: [
          { id: 'f_text', type: 'text', label: 'Text Field', placeholder: 'Standard text input' },
          { id: 'f_email', type: 'email', label: 'Email Field (Regex Validated)', placeholder: 'name@example.com', pattern: '^\\S+@\\S+\\.\\S+$', validationMessage: 'Please enter a valid email address' },
          { id: 'f_password', type: 'password', label: 'Password Field', placeholder: '••••••••' },
          { id: 'f_number', type: 'number', label: 'Number Field', defaultValue: 42 },
          { id: 'f_select', type: 'select', label: 'Select Dropdown', options: [{label: 'Option A', value: 'a'}, {label: 'Option B', value: 'b'}] },
          { id: 'f_textarea', type: 'textarea', label: 'Textarea', placeholder: 'Multi-line text...' },
          { id: 'f_checkbox', type: 'checkbox', label: 'I agree to the terms', defaultValue: true },
          { id: 'f_file', type: 'file', label: 'File Upload Dropzone' }
        ],
        showCancelButton: true,
        confirmButtonText: 'Submit Data'
      }).then(r => r.isConfirmed && console.log('Form Data:', r.value));
    };
  </script>
</body>
</html>
